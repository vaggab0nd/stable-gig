<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Repair Analyser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1rem; }

    /* --- Auth bar --- */
    .auth-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      min-height: 2rem;
    }
    .auth-email { color: #555; }
    .auth-btn {
      padding: 0.35rem 0.85rem;
      border-radius: 6px;
      border: 1px solid #4a6cf7;
      background: transparent;
      color: #4a6cf7;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .auth-btn:hover { background: #4a6cf7; color: #fff; }
    .auth-btn.secondary { border-color: #ccc; color: #555; }
    .auth-btn.secondary:hover { background: #eee; color: #333; }

    /* --- Modal --- */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      position: relative;
    }
    .modal h2 { font-size: 1.2rem; margin-bottom: 1.5rem; }
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #aaa;
      line-height: 1;
      padding: 0.1rem 0.3rem;
    }
    .modal-close:hover { color: #333; }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.35rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: #4a6cf7; }
    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      background: #4a6cf7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 0.75rem;
    }
    .btn-primary:hover:not(:disabled) { background: #3a5ce5; }
    .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
    .divider {
      text-align: center;
      color: #aaa;
      font-size: 0.8rem;
      margin: 0.25rem 0 1rem;
      position: relative;
    }
    .divider::before, .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: calc(50% - 1.5rem);
      height: 1px;
      background: #eee;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .btn-google {
      width: 100%;
      padding: 0.7rem;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-google:hover:not(:disabled) { background: #f8f8f8; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }
    .modal-info {
      font-size: 0.875rem;
      color: #555;
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .modal-error {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 6px;
      padding: 0.65rem 0.85rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .otp-hint { font-size: 0.8rem; color: #888; margin-top: 0.35rem; }
    .back-link {
      background: none;
      border: none;
      color: #4a6cf7;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0;
      margin-top: 0.5rem;
      display: block;
    }
    .back-link:hover { text-decoration: underline; }

    /* --- Main card --- */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 600px;
    }

    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 1.25rem;
    }
    .upload-area:hover, .upload-area.drag-over { border-color: #4a6cf7; }
    .upload-area input[type="file"] { display: none; }
    .upload-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .upload-label { font-size: 0.95rem; color: #555; }
    .file-name { margin-top: 0.5rem; font-size: 0.85rem; color: #4a6cf7; font-weight: 500; }

    button#analyse-btn {
      width: 100%;
      padding: 0.85rem;
      background: #4a6cf7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button#analyse-btn:hover:not(:disabled) { background: #3a5ce5; }
    button#analyse-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    #status {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.9rem;
      color: #555;
      min-height: 1.2em;
    }

    #result { margin-top: 1.5rem; display: none; }
    #result h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #eee;
    }

    .field { margin-bottom: 1rem; }
    .field-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.3rem;
    }
    .field-value { font-size: 0.95rem; color: #222; line-height: 1.5; }

    .tag {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .urgency-low       { background: #d1fae5; color: #065f46; }
    .urgency-medium    { background: #fef9c3; color: #713f12; }
    .urgency-high      { background: #fee2e2; color: #991b1b; }
    .urgency-emergency { background: #7f1d1d; color: #fff; }

    .pill {
      display: inline-block;
      background: #e0e7ff;
      color: #3730a3;
      border-radius: 999px;
      padding: 0.2rem 0.65rem;
      font-size: 0.8rem;
      margin: 0.2rem 0.2rem 0 0;
    }

    .question-list { padding-left: 1.25rem; }
    .question-list li { margin-bottom: 0.35rem; font-size: 0.95rem; }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem 1.5rem;
      background: #f8faff;
      border: 1px solid #e0e7ff;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
    }
    .meta-item .field-label { margin-bottom: 0.15rem; }
    .meta-item .field-value { font-size: 0.85rem; }
    .meta-map-link {
      display: inline-block;
      margin-top: 0.3rem;
      font-size: 0.8rem;
      color: #4a6cf7;
      text-decoration: none;
    }
    .meta-map-link:hover { text-decoration: underline; }

    .error-box {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ccc;
      border-top-color: #4a6cf7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Home Repair Analyser</h1>
  <p class="subtitle">Upload a video of your repair issue for an instant AI assessment</p>

  <!-- Auth bar -->
  <div class="auth-bar" id="auth-bar"></div>

  <!-- Login modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>

      <!-- Step 1: email + options -->
      <div id="modal-step-1">
        <h2>Sign in</h2>
        <div id="modal-error" class="modal-error" style="display:none"></div>
        <div class="form-group">
          <label for="auth-email">Email address</label>
          <input type="email" id="auth-email" placeholder="you@example.com"
                 autocomplete="email" />
        </div>
        <button class="btn-primary" id="send-code-btn">Send sign-in code</button>
        <div class="divider">or</div>
        <button class="btn-google" id="google-btn" disabled>
          <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>
      </div>

      <!-- Step 2: OTP verify -->
      <div id="modal-step-2" style="display:none">
        <h2>Check your email</h2>
        <div id="modal-error-2" class="modal-error" style="display:none"></div>
        <p class="modal-info">
          We sent a 6-digit code to <strong id="otp-email-display"></strong>. Enter it below.
        </p>
        <div class="form-group">
          <label for="otp-input">Sign-in code</label>
          <input type="text" id="otp-input" placeholder="123456" maxlength="6"
                 inputmode="numeric" autocomplete="one-time-code" />
          <p class="otp-hint">Check your spam folder if it doesn't arrive within a minute.</p>
        </div>
        <button class="btn-primary" id="verify-btn">Verify code</button>
        <button class="back-link" id="back-btn">&#8592; Use a different email</button>
      </div>
    </div>
  </div>

  <!-- Main card -->
  <div class="card">
    <div class="upload-area" id="drop-zone">
      <input type="file" id="video-input" accept="video/*" />
      <div class="upload-icon">&#127916;</div>
      <div class="upload-label">Click to choose a video, or drag &amp; drop here</div>
      <div class="file-name" id="file-name"></div>
    </div>

    <button id="analyse-btn" disabled>Analyse Video</button>
    <div id="status"></div>
    <div id="result"></div>
  </div>

  <script>
    // ------------------------------------------------------------------ //
    // Auth
    // ------------------------------------------------------------------ //
    let authConfig = null; // { supabase_url, anon_key }
    let session    = null; // { access_token, user_id, email }
    let pendingEmail = "";

    async function bootAuth() {
      // 1. Load public Supabase config
      try {
        const r = await fetch("/auth/config");
        if (r.ok) {
          authConfig = await r.json();
          if (authConfig.supabase_url) {
            document.getElementById("google-btn").disabled = false;
          }
        }
      } catch {}

      // 2. Handle Google OAuth redirect — token arrives in URL hash
      const hash = window.location.hash.slice(1);
      if (hash.includes("access_token=")) {
        const params = new URLSearchParams(hash);
        const token  = params.get("access_token");
        if (token) {
          // Clean the hash from the URL without triggering a reload
          window.history.replaceState(null, "", window.location.pathname);
          await establishSession(token, "");
          updateAuthUI();
          return;
        }
      }

      // 3. Restore existing session from storage
      const stored = sessionStorage.getItem("access_token");
      if (stored) {
        await establishSession(stored, sessionStorage.getItem("user_email") || "");
      }
      updateAuthUI();
    }

    async function establishSession(token, knownEmail) {
      // Try to get profile (validates token and fetches email)
      try {
        const r = await fetch("/me/profile", {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (r.ok) {
          const email = knownEmail || parseJwtEmail(token);
          session = { access_token: token, email };
          sessionStorage.setItem("access_token", token);
          sessionStorage.setItem("user_email", email);
          return;
        }
      } catch {}
      // Token invalid or expired
      clearSession();
    }

    function parseJwtEmail(token) {
      try {
        const payload = JSON.parse(
          atob(token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/"))
        );
        return payload.email || payload.user_metadata?.email || "";
      } catch { return ""; }
    }

    function clearSession() {
      sessionStorage.removeItem("access_token");
      sessionStorage.removeItem("user_email");
      session = null;
    }

    function updateAuthUI() {
      const bar = document.getElementById("auth-bar");
      if (session?.email) {
        bar.innerHTML =
          `<span class="auth-email">${esc(session.email)}</span>` +
          `<button class="auth-btn secondary" id="logout-btn">Log out</button>`;
        document.getElementById("logout-btn").addEventListener("click", () => {
          clearSession();
          updateAuthUI();
        });
      } else {
        bar.innerHTML =
          `<button class="auth-btn" id="login-btn">Log in / Sign up</button>`;
        document.getElementById("login-btn").addEventListener("click", openModal);
      }
    }

    // ---- Modal helpers ----
    function openModal() {
      showStep(1);
      document.getElementById("modal-backdrop").classList.add("open");
      setTimeout(() => document.getElementById("auth-email").focus(), 50);
    }
    function closeModal() {
      document.getElementById("modal-backdrop").classList.remove("open");
      clearModalErrors();
    }
    function showStep(n) {
      document.getElementById("modal-step-1").style.display = n === 1 ? "" : "none";
      document.getElementById("modal-step-2").style.display = n === 2 ? "" : "none";
      clearModalErrors();
    }
    function showModalError(step, msg) {
      const el = document.getElementById(step === 1 ? "modal-error" : "modal-error-2");
      el.textContent = msg;
      el.style.display = "";
    }
    function clearModalErrors() {
      document.getElementById("modal-error").style.display   = "none";
      document.getElementById("modal-error-2").style.display = "none";
    }

    document.getElementById("modal-close").addEventListener("click", closeModal);
    document.getElementById("modal-backdrop").addEventListener("click", (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    // ---- Send magic link (OTP) ----
    document.getElementById("send-code-btn").addEventListener("click", async () => {
      const email = document.getElementById("auth-email").value.trim();
      if (!email) { showModalError(1, "Please enter your email."); return; }

      const btn = document.getElementById("send-code-btn");
      btn.disabled = true;
      btn.textContent = "Sending…";
      clearModalErrors();

      try {
        const r = await fetch("/auth/magic-link", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || "Failed to send code");
        pendingEmail = email;
        document.getElementById("otp-email-display").textContent = email;
        showStep(2);
        setTimeout(() => document.getElementById("otp-input").focus(), 50);
      } catch (err) {
        showModalError(1, err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Send sign-in code";
      }
    });

    // ---- Verify OTP ----
    document.getElementById("verify-btn").addEventListener("click", async () => {
      const code = document.getElementById("otp-input").value.trim();
      if (!code) { showModalError(2, "Please enter the code from your email."); return; }

      const btn = document.getElementById("verify-btn");
      btn.disabled = true;
      btn.textContent = "Verifying…";
      clearModalErrors();

      try {
        const r = await fetch("/auth/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: pendingEmail, token: code }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || "Verification failed");

        session = { access_token: data.access_token, email: pendingEmail };
        sessionStorage.setItem("access_token", data.access_token);
        sessionStorage.setItem("user_email", pendingEmail);
        closeModal();
        updateAuthUI();
      } catch (err) {
        showModalError(2, err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Verify code";
      }
    });

    document.getElementById("back-btn").addEventListener("click", () => showStep(1));
    document.getElementById("otp-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("verify-btn").click();
    });
    document.getElementById("auth-email").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("send-code-btn").click();
    });

    // ---- Google OAuth (implicit flow — token returned in URL hash) ----
    document.getElementById("google-btn").addEventListener("click", () => {
      if (!authConfig?.supabase_url) return;
      const redirectTo = window.location.origin + window.location.pathname;
      const url =
        `${authConfig.supabase_url}/auth/v1/authorize` +
        `?provider=google` +
        `&redirect_to=${encodeURIComponent(redirectTo)}` +
        `&flow_type=implicit`;
      window.location.href = url;
    });

    // Boot auth on page load
    bootAuth();

    // ------------------------------------------------------------------ //
    // Upload & analyse
    // ------------------------------------------------------------------ //
    const dropZone   = document.getElementById("drop-zone");
    const videoInput = document.getElementById("video-input");
    const fileLabel  = document.getElementById("file-name");
    const analyseBtn = document.getElementById("analyse-btn");
    const statusEl   = document.getElementById("status");
    const resultEl   = document.getElementById("result");

    dropZone.addEventListener("click", () => videoInput.click());

    videoInput.addEventListener("change", () => {
      if (videoInput.files.length) onFileSelected(videoInput.files[0]);
    });

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("drag-over");
    });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("video/")) onFileSelected(file);
    });

    function onFileSelected(file) {
      fileLabel.textContent = file.name;
      analyseBtn.disabled = false;
      window._selectedFile = file;
      resultEl.style.display = "none";
      statusEl.textContent = "";
    }

    function getBrowserLocation() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) { resolve(null); return; }
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
          ()    => resolve(null),
          { timeout: 8000, maximumAge: 300000 }
        );
      });
    }

    analyseBtn.addEventListener("click", async () => {
      const file = window._selectedFile;
      if (!file) return;

      analyseBtn.disabled = true;
      resultEl.style.display = "none";
      setStatus("Getting location…", true);

      const location = await getBrowserLocation();
      setStatus("Uploading and analysing — this may take a moment…", true);

      const formData = new FormData();
      formData.append("file", file);
      if (location) {
        formData.append("browser_lat", location.lat);
        formData.append("browser_lon", location.lon);
      }

      // Include auth token if signed in so results are persisted
      const headers = {};
      const token = sessionStorage.getItem("access_token");
      if (token) headers["Authorization"] = `Bearer ${token}`;

      try {
        const resp = await fetch("/analyse", { method: "POST", body: formData, headers });

        let data;
        try {
          data = await resp.json();
        } catch {
          throw new Error(
            `Server returned an unreadable response (HTTP ${resp.status}). ` +
            `Check that GEMINI_API_KEY is set.`
          );
        }

        if (!resp.ok) throw new Error(data.detail || `Server error ${resp.status}`);

        setStatus("");
        renderResult(data);
      } catch (err) {
        setStatus("");
        renderError(err.message);
      } finally {
        analyseBtn.disabled = false;
      }
    });

    // ------------------------------------------------------------------ //
    // Render helpers
    // ------------------------------------------------------------------ //
    function setStatus(msg, spinner = false) {
      if (!msg) { statusEl.textContent = ""; return; }
      statusEl.innerHTML = spinner
        ? `<span class="spinner"></span>${msg}`
        : msg;
    }

    function renderMetadata(meta) {
      if (!meta || Object.keys(meta).length === 0) return "";

      const items = [];
      if (meta.recorded_at) {
        items.push({ label: "Recorded", value: esc(meta.recorded_at) });
      }
      if (meta.duration_seconds != null) {
        const mins = Math.floor(meta.duration_seconds / 60);
        const secs = (meta.duration_seconds % 60).toFixed(1);
        items.push({ label: "Duration", value: mins > 0 ? `${mins}m ${secs}s` : `${secs}s` });
      }
      if (meta.resolution) {
        items.push({ label: "Resolution", value: esc(meta.resolution) });
      }
      if (meta.frame_rate_fps != null) {
        items.push({ label: "Frame Rate", value: `${meta.frame_rate_fps} fps` });
      }
      if (meta.device_make || meta.device_model) {
        const device = [meta.device_make, meta.device_model].filter(Boolean).map(esc).join(" ");
        items.push({ label: "Device", value: device });
      }

      let gpsHtml = "";
      if (meta.latitude != null && meta.longitude != null) {
        const lat = meta.latitude.toFixed(6);
        const lon = meta.longitude.toFixed(6);
        const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
        const sourceLabel = meta.location_source === "browser"
          ? " <span style='font-weight:400;color:#888;'>(from browser)</span>"
          : "";
        gpsHtml = `
          <div class="meta-item" style="grid-column: 1 / -1;">
            <div class="field-label">GPS Location${sourceLabel}</div>
            <div class="field-value">${lat}, ${lon}
              <a class="meta-map-link" href="${mapsUrl}" target="_blank" rel="noopener">
                &#x1F4CD; View on map
              </a>
            </div>
          </div>`;
      }

      if (items.length === 0 && !gpsHtml) return "";

      const gridItems = items.map(i => `
        <div class="meta-item">
          <div class="field-label">${i.label}</div>
          <div class="field-value">${i.value}</div>
        </div>`).join("");

      return `
        <div class="field">
          <div class="field-label">Video Metadata</div>
          <div class="meta-grid">
            ${gridItems}
            ${gpsHtml}
          </div>
        </div>`;
    }

    function renderResult(data) {
      const urgencyClass = `urgency-${(data.urgency || "low").toLowerCase().replace(/\s+/g, "")}`;

      const materials = Array.isArray(data.materials_involved)
        ? data.materials_involved.map(m => `<span class="pill">${esc(m)}</span>`).join("")
        : esc(data.materials_involved || "—");

      const questions = Array.isArray(data.clarifying_questions)
        ? `<ul class="question-list">${data.clarifying_questions.map(q => `<li>${esc(q)}</li>`).join("")}</ul>`
        : esc(data.clarifying_questions || "—");

      resultEl.innerHTML = `
        <h2>Assessment Result</h2>

        ${renderMetadata(data.video_metadata)}

        <div class="field">
          <div class="field-label">Problem Type</div>
          <div class="field-value">${esc(data.problem_type || "—")}</div>
        </div>

        <div class="field">
          <div class="field-label">Description</div>
          <div class="field-value">${esc(data.description || "—")}</div>
        </div>

        <div class="field">
          <div class="field-label">Location in Home</div>
          <div class="field-value">${esc(data.location_in_home || "—")}</div>
        </div>

        <div class="field">
          <div class="field-label">Urgency</div>
          <div class="field-value">
            <span class="tag ${urgencyClass}">${esc(data.urgency || "—")}</span>
          </div>
        </div>

        <div class="field">
          <div class="field-label">Materials / Components Visible</div>
          <div class="field-value">${materials}</div>
        </div>

        <div class="field">
          <div class="field-label">Clarifying Questions for the Tradesperson</div>
          <div class="field-value">${questions}</div>
        </div>
      `;

      resultEl.style.display = "block";
    }

    function renderError(msg) {
      resultEl.innerHTML = `<div class="error-box"><strong>Error:</strong> ${esc(msg)}</div>`;
      resultEl.style.display = "block";
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
