name: Docs From Code

on:
  pull_request:
    paths:
      - backend/**
      - scripts/**
      - .github/workflows/docs-from-code.yml
  push:
    branches:
      - main
    paths:
      - backend/**
      - scripts/**
      - .github/workflows/docs-from-code.yml

jobs:
  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-test.txt

      - name: Regenerate docs from code and tests
        shell: pwsh
        run: ./scripts/generate_docs.ps1 -SkipHtml -SkipJunit

      - name: Fail if generated docs are stale
        run: git diff --exit-code -- docs/generated
